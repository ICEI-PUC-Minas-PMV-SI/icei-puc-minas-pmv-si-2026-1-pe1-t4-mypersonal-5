<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal - Agenda</title>
    <link rel="stylesheet" href="../../assets/css/aluno/agenda.css">
    
</head>
<body>

     <nav class="sidebar">
        <div class="brand">My Personal</div>
            <div class="user-profile-sidebar">
                <img id="side-profile-img" src="https://via.placeholder.com/40" alt="Foto" class="side-avatar">
                <span id="side-user-name" class="side-name">Usuário</span>
            </div>

            <a href="inicial-aluno.html"><div class="menu-item"> Início</div></a>
            <a href="treino.html"><div class="menu-item"> Meu Treino</div></a>
            <a href="dieta.html"><div class="menu-item"> Minha Dieta</div></a>
            <a href="historico.html"><div class="menu-item"> Histórico</div></a>
            <a href="agenda.html"> <div class="menu-item active">Agenda</div></a> 
            <a href="mensagens.html"><div class="menu-item"> Mensagens</div></a>
            <a href="configuracoes.html" class="menu-item"> Configurações</a>

            <div class="sidebar-footer">
                <button onclick="fazerLogout()" class="btn-logout">Sair</button>
            </div>
    </nav>

    <main class="main-content">
        
        <div class="calendar-header">
            <div class="calendar-nav">
                <h2 id="month-year-display">Mês e Ano</h2>
                <button id="prev-month" class="btn-icon">&lt;</button>
                <button id="next-month" class="btn-icon">&gt;</button>
            </div>
            <button id="new-event-btn" class="btn-primary">+ Novo compromisso</button>
        </div>

        <div class="calendar-wrapper">
            <div class="calendar-grid" id="calendar-grid">
                </div>
        </div>

    </main>

    <script src="../../assets/js/script.js"></script>

   <script>
    function atualizarPerfilLateral() {
        const nomeSalvo = localStorage.getItem('userName');
        const fotoSalva = localStorage.getItem('userPhoto');

        if (nomeSalvo) {
            document.getElementById('side-user-name').innerText = nomeSalvo;
        }
        if (fotoSalva) {
            document.getElementById('side-profile-img').src = fotoSalva;
        }
    }

    // Função para o botão de sair funcionar
    function fazerLogout() {
        if (confirm("Deseja realmente sair?")) {
            // Limpa os dados do usuário do navegador
            localStorage.clear();
            // Redireciona para a página de login
            window.location.href = "../public/index.html"; 
        }
    }

    window.addEventListener('load', atualizarPerfilLateral);
    </script>
</body>
</html>
