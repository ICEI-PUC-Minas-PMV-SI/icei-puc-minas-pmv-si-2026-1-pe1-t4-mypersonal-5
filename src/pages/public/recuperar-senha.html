<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - MyPersonal</title>
    <link rel="stylesheet" href="../../assets/css/public/style.css"> </head>
<body>

    <div class="container">
        <div class="right-panel" style="width: 100%; display: flex; justify-content: center;">
            <div class="login-box">
                <h2>Recuperar senha</h2>
                <p class="login-subtitle">Digite seu e-mail para receber as instruções de redefinição.</p>

                <form id="recoverForm">
                    <div class="input-group">
                        <label for="email">E-mail cadastrado</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>

                   <button type="submit" class="btn-primary">Enviar link de recuperação</button>
                </form>

                <div class="divider"></div>

                <a href="index.html" class="forgot-password" style="text-align: center; display: block;">
                    Voltar para o login
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('recoverForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            
            // Aqui você pode colocar um alerta só para testar
            alert('Um link de recuperação foi enviado para: ' + email);
            
            // Opcional: Redirecionar de volta para o login após o envio
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
